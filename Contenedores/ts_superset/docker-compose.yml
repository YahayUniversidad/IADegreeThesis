##
## Contenedor de Superset
##
services:
  superset_srv:
    build: .
    image: local/superset-postgres:latest
    container_name: superset
    ports:
      - "8088:8088"
      - "5008:5008"
    environment:
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
      SUPERSET_SECRET_KEY: your_secret_key_here
      SUPERSET__SQLALCHEMY_DATABASE_URI: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db_srv:5432/${POSTGRES_DB}
      SUPERSET_ADMIN_USERNAME: admin
      SUPERSET_ADMIN_FIRSTNAME: Superset
      SUPERSET_ADMIN_LASTNAME: Admin
      SUPERSET_ADMIN_EMAIL: omargo33@gmail.com
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD}
      MCP_DEV_USERNAME: admin
    volumes:
      - ./superset_data:/var/lib/superset
    command:
      - /bin/bash
      - -c
      - |
        superset db upgrade &&
        superset fab create-admin --username "$$SUPERSET_ADMIN_USERNAME" --firstname "$$SUPERSET_ADMIN_FIRSTNAME" --lastname "$$SUPERSET_ADMIN_LASTNAME" --email "$$SUPERSET_ADMIN_EMAIL" --password "$$SUPERSET_ADMIN_PASSWORD" &&
        superset load_examples &&
        superset init &&
        superset run -h 0.0.0.0 -p 8088 --with-threads --reload --debugger
    depends_on:
      db_srv:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  db_srv:
    image: postgres:14
    container_name: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PORT: ${PGPORT}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  superset_data:
  postgres_data:
